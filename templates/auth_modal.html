<!-- ── Auth Modal ── -->
<div id="auth-backdrop" class="modal-backdrop" style="z-index:2000">
  <div class="modal auth-modal" role="dialog" aria-modal="true">

    <!-- Login -->
    <div id="auth-login-view">
      <div class="modal-header">
        <h3>Добро пожаловать в Noxtify</h3>
        <p style="color:var(--t3);font-size:13px;margin-top:4px">Войди чтобы слушать музыку</p>
      </div>
      <div id="auth-error" style="display:none;color:#f87171;font-size:13px;margin-bottom:12px;padding:10px 12px;background:rgba(248,113,113,.1);border-radius:8px"></div>
      <label class="modal-field">
        <span>Email или имя пользователя</span>
        <input type="text" id="login-field" autocomplete="username" placeholder="user@example.com"/>
      </label>
      <label class="modal-field">
        <span>Пароль</span>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••"/>
      </label>
      <div class="modal-actions" style="flex-direction:column;gap:8px">
        <button class="btn-outline" id="btn-do-login" style="width:100%;text-align:center">Войти</button>
        <button class="btn-link" id="btn-go-register" style="font-size:13px">Нет аккаунта? Зарегистрироваться</button>
      </div>
    </div>

    <!-- Register -->
    <div id="auth-register-view" style="display:none">
      <div class="modal-header">
        <h3>Создать аккаунт</h3>
      </div>
      <div id="auth-reg-error" style="display:none;color:#f87171;font-size:13px;margin-bottom:12px;padding:10px 12px;background:rgba(248,113,113,.1);border-radius:8px"></div>
      <label class="modal-field">
        <span>Имя пользователя</span>
        <input type="text" id="reg-username" autocomplete="username" placeholder="cooluser"/>
      </label>
      <label class="modal-field">
        <span>Email</span>
        <input type="email" id="reg-email" autocomplete="email" placeholder="user@example.com"/>
      </label>
      <label class="modal-field">
        <span>Пароль</span>
        <input type="password" id="reg-password" autocomplete="new-password" placeholder="минимум 6 символов"/>
      </label>
      <div class="modal-actions" style="flex-direction:column;gap:8px">
        <button class="btn-outline" id="btn-do-register" style="width:100%;text-align:center">Зарегистрироваться</button>
        <button class="btn-link" id="btn-go-login" style="font-size:13px">Уже есть аккаунт? Войти</button>
      </div>
    </div>

    <div id="auth-verify-view" style="display:none">
      <div class="modal-header">
        <h3>Подтверждение email</h3>
        <p style="color:var(--t3);font-size:13px;margin-top:4px">Введи 6-значный код из письма</p>
      </div>
      <div id="auth-verify-error" style="display:none;color:#f87171;font-size:13px;margin-bottom:12px;padding:10px 12px;background:rgba(248,113,113,.1);border-radius:8px"></div>
      <label class="modal-field">
        <span>Код подтверждения</span>
        <input type="text" id="verify-code" maxlength="6" placeholder="123456" 
          style="font-size:24px;letter-spacing:8px;text-align:center"/>
      </label>
      <div class="modal-actions" style="flex-direction:column;gap:8px">
        <button class="btn-outline" id="btn-do-verify" style="width:100%;text-align:center">Подтвердить</button>
        <button class="btn-link" id="btn-verify-back" style="font-size:13px">← Назад</button>
      </div>
    </div>

  </div>
</div>

<!-- ── Profile popup (топбар) ── -->
<div id="profile-popup" style="
  display:none;position:fixed;top:70px;right:16px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:16px;min-width:220px;
  box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:1500;flex-direction: column;
">
  <div style="display:flex;align-items:center;gap:12px;margin-right:14px;margin-bottom:12px">
    <div class="avatar" id="profile-avatar" style="width:40px;height:40px;font-size:16px"></div>
    <div>
      <div id="profile-username" style="font-weight:700;font-size:14px"></div>
      <div id="profile-email" style="font-size:12px;color:var(--t3)"></div>
    </div>
  </div>
  <!-- Кнопка загрузки треков -->
  <button id="btn-upload-from-profile" style="
    width:100%;text-align:left;padding:8px 10px;
    border-radius:8px;font-size:13px;color:var(--t1);
    display:flex;align-items:center;gap:8px;
    transition:background .15s;background:none;border:none;cursor:pointer;
    margin-bottom:4px;
  " onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='none'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="17 8 12 3 7 8"></polyline>
      <line x1="12" y1="3" x2="12" y2="15"></line>
    </svg>
    Загрузить треки
  </button>

  <!-- Spotify open button -->
  <button id="btn-open-spotify-download" style="
    width:100%;text-align:left;padding:8px 10px;
    border-radius:8px;font-size:13px;color:var(--t1);
    display:flex;align-items:center;gap:8px;
    transition:background .15s;background:none;border:none;cursor:pointer;
    margin-bottom:8px;
  " onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='none'">
    <svg viewBox="0 0 256 256" preserveAspectRatio="xMidYMid" height="20px" width="20px"><path d="M128 0C57.308 0 0 57.309 0 128c0 70.696 57.309 128 128 128 70.697 0 128-57.304 128-128C256 57.314 198.697.007 127.998.007l.001-.006Zm58.699 184.614c-2.293 3.76-7.215 4.952-10.975 2.644-30.053-18.357-67.885-22.515-112.44-12.335a7.981 7.981 0 0 1-9.552-6.007 7.968 7.968 0 0 1 6-9.553c48.76-11.14 90.583-6.344 124.323 14.276 3.76 2.308 4.952 7.215 2.644 10.975Zm15.667-34.853c-2.89 4.695-9.034 6.178-13.726 3.289-34.406-21.148-86.853-27.273-127.548-14.92-5.278 1.594-10.852-1.38-12.454-6.649-1.59-5.278 1.386-10.842 6.655-12.446 46.485-14.106 104.275-7.273 143.787 17.007 4.692 2.89 6.175 9.034 3.286 13.72v-.001Zm1.345-36.293C162.457 88.964 94.394 86.71 55.007 98.666c-6.325 1.918-13.014-1.653-14.93-7.978-1.917-6.328 1.65-13.012 7.98-14.935C93.27 62.027 168.434 64.68 215.929 92.876c5.702 3.376 7.566 10.724 4.188 16.405-3.362 5.69-10.73 7.565-16.4 4.187h-.006Z" fill="#1ED760"/></svg>
    Spotify
  </button>

  <div style="height:1px;background:var(--border);margin-bottom:10px"></div>

  <button id="btn-logout" style="
    width:100%;text-align:left;padding:8px 10px;
    border-radius:8px;font-size:13px;color:#f87171;
    display:flex;align-items:center;gap:8px;
    transition:background .15s;background:none;border:none;cursor:pointer
  " onmouseover="this.style.background='rgba(248,113,113,.1)'" onmouseout="this.style.background='none'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
    </svg>
    Выйти
  </button>
</div>
