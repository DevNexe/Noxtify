{% extends "base.html" %}
{% block title %}Плейлисты — Noxtify{% endblock %}
{% block content %}
<section class="section" id="section-playlists">
  <div class="playlist-header">
    <h2 class="section-title">Плейлисты</h2>
    <button class="btn-outline" id="btn-new-playlist">Новый плейлист</button>
  </div>
  <div id="playlist-list" class="playlist-list"></div>
</section>

<section class="section" id="section-playlist" style="display:none">
  <div class="playlist-header">
    <button class="btn-link" id="btn-back-to-playlists">← Плейлисты</button>
    <div>
      <h2 class="section-title" id="playlist-name">Плейлист</h2>
      <p class="section-sub" id="playlist-count">0 треков</p>
    </div>
  </div>
  <div class="track-table">
    <div class="track-header">
      <span class="c-num">#</span>
      <span class="c-info">Title</span>
      <span class="c-like">Liked</span>
      <span class="c-dur">Duration</span>
      <span class="c-menu"></span>
    </div>
    <div id="playlist-track-list"></div>
  </div>
</section>

<div id="legacy-modal-backdrop" class="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="legacy-metadata-modal-title">
    <div class="modal-header">
      <h3 id="legacy-metadata-modal-title">Редактировать метаданные</h3>
    </div>
    <form id="legacy-metadata-form">
      <label class="modal-field">
        Название
        <input type="text" id="legacy-meta-title" required />
      </label>
      <label class="modal-field">
        Исполнитель
        <input type="text" id="legacy-meta-artist" required />
      </label>
      <label class="modal-field">
        Альбом
        <input type="text" id="legacy-meta-album" required />
      </label>
      <label class="modal-field">
        Обложка
        <input type="file" id="legacy-cover-input" accept="image/*" />
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-outline" id="legacy-btn-metadata-cancel">Отмена</button>
        <button type="submit" class="btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<input type="file" id="legacy-file-input" accept=".mp3,.flac,.ogg,.wav,.m4a" multiple hidden/>
{% endblock %}
